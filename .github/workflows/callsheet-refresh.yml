# .github/workflows/callsheet-refresh.yml
# Automated call sheet data refresh for PSPD Interactive Call Sheets
#
# This workflow:
#   1. Runs on schedule (5 AM PST daily) or on manual trigger
#   2. Connects to Azure SQL via AZURE_SQL_CONN_STR secret
#   3. Runs callsheet_refresh.py to generate data/callsheets.json
#   4. Commits and pushes the updated JSON to GitHub Pages
#
# Required GitHub Secrets:
#   AZURE_SQL_CONN_STR - Full ODBC connection string for Denticon Azure SQL
#
# Azure SQL Views Queried:
#   vw_RecallHouseholdDueNext30Days_PBI  - Recall families due within 30 days
#   vw_RecallHouseholdDue                - Overdue recall families
#   vw_TxAction_Unscheduled_Current_Scheduler_v2 - Unscheduled treatment plans
#   vw_LastUpdateStamp / vw_DataLastUpdate       - Data freshness timestamps
#
# Manual trigger: Go to Actions tab > "Refresh Call Sheets" > "Run workflow"

name: Refresh Call Sheets

on:
  schedule:
    # Run at 5 AM PST (1 PM UTC) daily — before office opens
    - cron: '0 13 * * *'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyodbc
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Run callsheet refresh
        env:
          AZURE_SQL_CONN_STR: ${{ secrets.AZURE_SQL_CONN_STR }}
        run: python scripts/callsheet_refresh.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/callsheets.json
          git diff --staged --quiet || git commit -m "Auto-refresh call sheet data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
