# .github/workflows/payroll-refresh.yml
# Automated payroll data refresh for PSPD Doctor Payroll Dashboard
#
# This workflow:
#   1. Runs on schedule (6 AM and 6 PM PST daily) or on manual trigger
#   2. Connects to Azure SQL via AZURE_SQL_CONN_STR secret
#   3. Runs payroll_refresh.py to generate data/payroll.json
#   4. Commits and pushes the updated JSON to GitHub Pages
#
# Required GitHub Secrets:
#   AZURE_SQL_CONN_STR - Full ODBC connection string for Denticon Azure SQL
#
# Manual trigger: Go to Actions tab > "Refresh Payroll Data" > "Run workflow"

name: Refresh Payroll Data

on:
  schedule:
    # Run at 6 AM and 6 PM PST (2 PM and 2 AM UTC)
    - cron: '0 14 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      period:
        description: 'Specific pay period (e.g., 3.13.26). Leave blank for auto-detect.'
        required: false
        type: string
      all_periods:
        description: 'Refresh all periods?'
        required: false
        type: boolean
        default: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyodbc openpyxl
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Run payroll refresh
        env:
          AZURE_SQL_CONN_STR: ${{ secrets.AZURE_SQL_CONN_STR }}
        run: |
          ARGS="--output data/payroll.json"
          if [ -n "${{ github.event.inputs.period }}" ]; then
            ARGS="$ARGS --period ${{ github.event.inputs.period }}"
          elif [ "${{ github.event.inputs.all_periods }}" = "true" ]; then
            ARGS="$ARGS --all-periods"
          else
            ARGS="$ARGS --recent"
          fi
          python scripts/payroll_refresh.py $ARGS

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/payroll.json
          git diff --staged --quiet || git commit -m "Auto-refresh payroll data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
