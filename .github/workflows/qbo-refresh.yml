name: QBO Financial Refresh

on:
  schedule:
    - cron: '0 10 * * *'   # 4 AM CST (10 AM UTC) — runs daily
  workflow_dispatch:         # manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pynacl python-dateutil

      - name: Pull QBO financials
        env:
          QBO_CLIENT_ID: ${{ secrets.QBO_CLIENT_ID }}
          QBO_CLIENT_SECRET: ${{ secrets.QBO_CLIENT_SECRET }}
          QBO_REFRESH_TOKEN: ${{ secrets.QBO_REFRESH_TOKEN }}
          QBO_REALM_ID: ${{ secrets.QBO_REALM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/qbo_refresh.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/financials.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-refresh QBO financial data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push
          fi
