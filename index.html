<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSPD Analytics - Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1E3228;
            --bg-secondary: #253D32;
            --bg-card: #2E483A;
            --bg-card-hover: #3D5E4C;
            --bg-sidebar: #172A20;
            --accent: #CD7823;
            --accent-glow: rgba(205, 120, 35, 0.15);
            --accent-soft: #A8611B;
            --text-primary: #F5F5F5;
            --text-secondary: #94A3B8;
            --text-muted: #6F8090;
            --border: rgba(255, 255, 255, 0.08);
            --border-accent: rgba(205, 120, 35, 0.3);
            --success: #3D7A4A;
            --warning: #CD7823;
            --danger: #B5403E;
            --cat-production: #CD7823;
            --cat-patients: #3D7A4A;
            --cat-operations: #4A7B8C;
            --cat-payroll: #8B6BB5;
            --radius: 12px;
            --sidebar-width: 260px;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* LOGIN OVERLAY */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .login-overlay.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .login-card {
            background-color: var(--bg-card);
            padding: 48px 40px;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            max-width: 380px;
            width: 100%;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .login-logo {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent) 0%, #E8943D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-select,
        .form-input {
            width: 100%;
            padding: 12px 14px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-select:focus,
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input[type="password"] {
            letter-spacing: 0.3em;
        }

        .login-button {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 24px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(205, 120, 35, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .error-message {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            min-height: 18px;
        }

        /* MAIN LAYOUT */
        .main-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .main-layout.hidden {
            display: none;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: width 0.3s ease;
        }

        .sidebar-logo {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo-text {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent) 0%, #E8943D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .sidebar-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .nav-section {
            padding: 24px 0;
            border-bottom: 1px solid var(--border);
            flex: 1;
        }

        .nav-label {
            padding: 0 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .nav-item {
            padding: 12px 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            position: relative;
            font-size: 14px;
        }

        .nav-item:hover {
            color: var(--text-primary);
            border-left-color: var(--accent);
        }

        .nav-item.active {
            color: var(--text-primary);
            border-left-color: var(--accent);
            background-color: rgba(205, 120, 35, 0.1);
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .user-info {
            margin-bottom: 16px;
        }

        .user-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .user-role {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: capitalize;
        }

        .sign-out-button {
            width: 100%;
            padding: 10px 12px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .sign-out-button:hover {
            background-color: rgba(205, 120, 35, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 32px;
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border);
        }

        .content-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .content-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .search-bar {
            width: 100%;
            max-width: 340px;
            padding: 10px 14px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .search-bar::placeholder {
            color: var(--text-muted);
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .filter-section {
            padding: 0 32px 32px 32px;
            background-color: var(--bg-primary);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-button {
            padding: 8px 16px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .filter-button:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .filter-button.active {
            color: white;
            border: none;
        }

        .filter-button.active[data-category="production"] {
            background-color: var(--cat-production);
        }

        .filter-button.active[data-category="patients"] {
            background-color: var(--cat-patients);
        }

        .filter-button.active[data-category="operations"] {
            background-color: var(--cat-operations);
        }

        .filter-button.active[data-category="payroll"] {
            background-color: var(--cat-payroll);
        }

        .filter-button.active[data-category="all"] {
            background-color: var(--accent);
        }

        /* CARDS CONTAINER */
        .cards-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 32px 32px 32px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .report-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .report-card:hover {
            background-color: var(--bg-card-hover);
            transform: translateY(-2px);
            border-color: var(--border-accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .card-icon {
            font-size: 32px;
            line-height: 1;
        }

        .card-badge-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .card-badge.production {
            background-color: rgba(205, 120, 35, 0.15);
            color: var(--cat-production);
        }

        .card-badge.patients {
            background-color: rgba(61, 122, 74, 0.15);
            color: var(--cat-patients);
        }

        .card-badge.operations {
            background-color: rgba(74, 123, 140, 0.15);
            color: var(--cat-operations);
        }

        .card-badge.payroll {
            background-color: rgba(139, 107, 181, 0.15);
            color: var(--cat-payroll);
        }

        .card-badge.coming-soon {
            border: 1px dashed var(--text-muted);
            background-color: transparent;
            color: var(--text-muted);
            padding: 3px 8px;
            font-size: 10px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .card-description {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
            flex: 1;
            line-height: 1.5;
        }

        .card-link {
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .card-link:hover {
            gap: 10px;
        }

        .card-link.coming-soon {
            opacity: 0.6;
            cursor: default;
            pointer-events: none;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            :root {
                --sidebar-width: 0;
            }

            .sidebar {
                position: fixed;
                left: -100%;
                height: 100%;
                z-index: 100;
                max-width: 260px;
                width: 260px;
                transition: left 0.3s ease;
            }

            .sidebar.open {
                left: 0;
            }

            .content-header {
                padding: 20px 16px;
            }

            .content-title {
                font-size: 24px;
            }

            .filter-section {
                padding: 0 16px 16px 16px;
            }

            .cards-container {
                padding: 0 16px 16px 16px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        /* SCROLLBAR STYLING */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- LOGIN OVERLAY -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-logo">PSPD Analytics</div>
            <div class="login-subtitle">Command Center — Sign in to continue</div>

            <div class="form-group">
                <label class="form-label">Select Your Name</label>
                <select class="form-select" id="profileSelect">
                    <option value="">Choose your profile...</option>
                    <option value="christopher">Dr. Lugo</option>
                    <option value="tanya">Tanya</option>
                    <option value="jessica">Jessica</option>
                    <option value="chelsey">Chelsey</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">PIN (4 digits)</label>
                <input type="password" class="form-input" id="pinInput" placeholder="••••" maxlength="4">
            </div>

            <button class="login-button" id="signInButton">Sign In</button>
            <div class="error-message" id="errorMessage"></div>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="main-layout" id="mainLayout">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-text">PSPD Analytics</div>
                <div class="sidebar-subtitle">Command Center</div>
            </div>

            <div class="nav-section">
                <div class="nav-label">Navigation</div>
                <div class="nav-item active" data-filter="all">All Reports</div>
                <div class="nav-item" data-filter="production">📈 Production</div>
                <div class="nav-item" data-filter="patients">👥 Patient Management</div>
                <div class="nav-item" data-filter="operations">📊 Operations</div>
                <div class="nav-item" data-filter="payroll">💰 Payroll</div>
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-name" id="userNameDisplay">-</div>
                    <div class="user-role" id="userRoleDisplay">-</div>
                </div>
                <button class="sign-out-button" id="signOutButton">Sign Out</button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="content-header">
                <div class="content-title">Dashboard</div>
                <div class="content-subtitle">Welcome back — here are your analytics reports.</div>
                <input type="text" class="search-bar" id="searchInput" placeholder="Search reports...">
            </div>

            <div class="filter-section">
                <button class="filter-button active" data-category="all">All</button>
                <button class="filter-button" data-category="production">⚙️ Production</button>
                <button class="filter-button" data-category="patients">👥 Patient Management</button>
                <button class="filter-button" data-category="operations">📊 Operations</button>
                <button class="filter-button" data-category="payroll">💰 Payroll</button>
            </div>

            <div class="cards-container">
                <div class="cards-grid" id="cardsGrid"></div>
            </div>
        </div>
    </div>

    <script>
        // USER DATA
        const users = {
            christopher: { name: 'Dr. Lugo', role: 'admin', pin: '0802' },
            tanya: { name: 'Tanya', role: 'admin', pin: '1111' },
            jessica: { name: 'Jessica', role: 'billing', pin: '2222' },
            chelsey: { name: 'Chelsey', role: 'frontdesk', pin: '3333' }
        };

        // REPORTS DATA
        const reports = [
            {
                title: 'Doctor Production',
                description: 'Provider payroll and production totals by pay period. Track individual doctor output and revenue.',
                icon: '📈',
                category: 'production',
                categoryLabel: 'Production',
                url: 'https://app.powerbi.com/groups/me/reports/28d67d19-4ea5-4f13-a675-8d39a543a2f3?experience=power-bi'
            },
            {
                title: 'Production Model (2025)',
                description: 'Locked production model with targets, forecasts, and KPIs for the 2025 fiscal year.',
                icon: '🎯',
                category: 'production',
                categoryLabel: 'Production',
                url: 'https://app.powerbi.com/groups/me/reports/c98fcc58-247e-42af-8531-0135ed4e7213/56a05638d5e5f18bd9b0?experience=power-bi'
            },
            {
                title: 'Recall Call Lists',
                description: 'Patient recall tracking — overdue appointments, call priorities, and outreach status.',
                icon: '📞',
                category: 'patients',
                categoryLabel: 'Patient Mgmt',
                url: 'https://app.powerbi.com/groups/me/reports/ec723259-69be-4b36-a8fd-1e82f4a7fb34/72dc7e008c2161865143?experience=power-bi'
            },
            {
                title: 'Treatment — Unscheduled',
                description: 'Patients with diagnosed but unscheduled treatment plans. Follow-up tracking and revenue recovery.',
                icon: '🦷',
                category: 'patients',
                categoryLabel: 'Patient Mgmt',
                url: 'https://app.powerbi.com/groups/me/reports/e271adac-b68e-425d-afaa-a838a1384364/e114c9b44cd606520a5e?experience=power-bi'
            },
            {
                title: 'Doctor Compensation',
                description: 'Automated associate doctor payroll — collections by provider and office, commission calculations, and pay period tracking.',
                icon: '💰',
                category: 'payroll',
                categoryLabel: 'Payroll',
                url: '#payroll-coming-soon',
                comingSoon: true
            }
        ];

        // STATE
        let currentUser = null;
        let currentFilter = 'all';
        let currentSearch = '';

        // DOM ELEMENTS
        const loginOverlay = document.getElementById('loginOverlay');
        const mainLayout = document.getElementById('mainLayout');
        const profileSelect = document.getElementById('profileSelect');
        const pinInput = document.getElementById('pinInput');
        const signInButton = document.getElementById('signInButton');
        const errorMessage = document.getElementById('errorMessage');
        const cardsGrid = document.getElementById('cardsGrid');
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-button');
        const navItems = document.querySelectorAll('.nav-item');
        const signOutButton = document.getElementById('signOutButton');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const userRoleDisplay = document.getElementById('userRoleDisplay');

        // LOGIN FUNCTIONALITY
        signInButton.addEventListener('click', handleLogin);
        pinInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        function handleLogin() {
            const userId = profileSelect.value;
            const pin = pinInput.value;

            errorMessage.textContent = '';

            if (!userId) {
                errorMessage.textContent = 'Please select a profile.';
                return;
            }

            if (!pin || pin.length !== 4) {
                errorMessage.textContent = 'PIN must be 4 digits.';
                return;
            }

            const user = users[userId];
            if (!user || user.pin !== pin) {
                errorMessage.textContent = 'Invalid PIN. Please try again.';
                pinInput.value = '';
                return;
            }

            // LOGIN SUCCESS
            currentUser = { ...user, id: userId };
            userNameDisplay.textContent = user.name;
            userRoleDisplay.textContent = user.role;
            loginOverlay.classList.add('hidden');
            mainLayout.classList.remove('hidden');
            renderCards();
        }

        // SEARCH FUNCTIONALITY
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderCards();
        });

        // FILTER FUNCTIONALITY
        filterButtons.forEach(button => {
            button.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                button.classList.add('active');
                currentFilter = button.dataset.category;
                renderCards();
            });
        });

        // SIDEBAR NAV FUNCTIONALITY
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                const filter = item.dataset.filter;
                currentFilter = filter;

                // Update filter buttons
                filterButtons.forEach(b => {
                    b.classList.remove('active');
                    if (b.dataset.category === filter) {
                        b.classList.add('active');
                    }
                });

                renderCards();
            });
        });

        // SIGN OUT FUNCTIONALITY
        signOutButton.addEventListener('click', () => {
            location.reload();
        });

        // RENDER CARDS
        function renderCards() {
            let filtered = reports;

            // Filter by category
            if (currentFilter !== 'all') {
                filtered = filtered.filter(r => r.category === currentFilter);
            }

            // Filter by search
            if (currentSearch) {
                filtered = filtered.filter(r =>
                    r.title.toLowerCase().includes(currentSearch) ||
                    r.description.toLowerCase().includes(currentSearch)
                );
            }

            // Clear and render
            cardsGrid.innerHTML = '';

            if (filtered.length === 0) {
                cardsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px 20px; color: var(--text-muted);">No reports found.</div>';
                return;
            }

            filtered.forEach(report => {
                const card = document.createElement('div');
                card.className = 'report-card';

                let badgeHtml = `<div class="card-badge ${report.category}">${report.categoryLabel}</div>`;
                if (report.comingSoon) {
                    badgeHtml += `<div class="card-badge coming-soon">Coming Soon</div>`;
                }

                let linkHtml;
                if (report.comingSoon) {
                    linkHtml = `<a class="card-link coming-soon">Open Report →</a>`;
                } else {
                    linkHtml = `<a href="${report.url}" target="_blank" class="card-link">Open Report →</a>`;
                }

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-icon">${report.icon}</div>
                        <div class="card-badge-group">
                            ${badgeHtml}
                        </div>
                    </div>
                    <div class="card-title">${report.title}</div>
                    <div class="card-description">${report.description}</div>
                    ${linkHtml}
                `;

                // Handle coming soon click
                if (report.comingSoon) {
                    const link = card.querySelector('.card-link');
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('This report will be connected once the Power BI dashboard is published.');
                    });
                }

                cardsGrid.appendChild(card);
            });
        }

        // INITIAL STATE
        loginOverlay.classList.remove('hidden');
        mainLayout.classList.add('hidden');
    </script>
</body>
</html>
